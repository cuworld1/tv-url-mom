<title>TV</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; font-family:system-ui,sans-serif; background:#111; color:#eee;
         display:flex; min-height:100vh; align-items:center; justify-content:center; }
  .wrap { text-align:center; padding:20px; width:100%; max-width:760px; }
  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:18px; }
  a.site { display:flex; align-items:center; gap:18px; padding:28px 24px; background:#1e1e1e;
           border:1px solid #333; border-radius:20px; color:#fff; text-decoration:none; }
  a.site:active { background:#2a2a2a; }
  a.site img { width:60px; height:60px; border-radius:14px; flex:0 0 auto; background:#fff; object-fit:contain; }
  a.site .t { text-align:left; overflow:hidden; min-width:0; }
  a.site .t b { font-size:22px; }
  a.site .t small { display:block; color:#888; font-size:13px; margin-top:4px; word-break:break-all; }
  .msg { color:#888; font-size:14px; }
</style>

/* 사이트 표시 이름 — 여기만 고치면 됩니다 */
var NAMES = {
  tvwiki: '영상관 1',
  mvking: '영상관 2',
  tvroom: '영상관 3',
  tvmon:  '영상관 4'
};
(function () {
  var app = document.getElementById('app');
  var key = (location.hash.slice(1) ||
             new URLSearchParams(location.search).get('go') || '').trim().toLowerCase();
  fetch('urls.json?_=' + Date.now(), { cache: 'no-store' })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (key && data[key] && data[key].url) { location.replace(data[key].url); return; }
      var html = '<div class="grid">';
      Object.keys(data).forEach(function(k){
        var u = data[k].url || '#';
        var ic = ICONS[k] ? '<img src="' + ICONS[k] + '" alt="">' : '';
        html += '<a class="site" href="' + u + '">' + ic +
                '<span class="t"><b>' + (NAMES[k] || k) + '</b><small>' + u.replace(/^https?:\/\//,'') + '</small></span></a>';
      });
      app.innerHTML = html + '</div>';
    })
    .catch(function(){ app.innerHTML = '<div class="msg">주소 정보를 불러오지 못했습니다.</div>'; });
})();
