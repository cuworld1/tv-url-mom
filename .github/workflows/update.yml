name: Update site URLs

on:
  schedule:
    - cron: '0 */3 * * *'   # 3시간마다
  workflow_dispatch: {}       # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Scrape latest URLs
        run: node scrape.js
      - name: Commit changes
        run: |
          if [[ -n "$(git status --porcelain urls.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add urls.json
            git commit -m "Auto-update site URLs"
            git push
          else
            echo "No changes"
          fi
