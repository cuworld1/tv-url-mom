<title>tvwiki</title>
<style>html,body{height:100%;margin:0;background:#111;color:#aaa;font:15px system-ui,sans-serif;display:flex;align-items:center;justify-content:center;text-align:center} a{color:#4ea1ff;display:block;margin:8px 0;text-decoration:none}</style>
</head>
<body>
<div id="m"></div>
<script>
(function(){
  var KEY='tvwiki', ck='tvu2_'+KEY;
  function done(u){ try{localStorage.setItem(ck,u);}catch(e){} location.replace(u); }
  function msg(s){ document.getElementById('m').innerHTML=s; }
  // probe: 2=favicon성공(강함), 1=fetch만(약함), 0=실패
  function probe(u){ return new Promise(function(res){ var fav=0,fet=0,n=0,fin=false; function chk(){ if(fin)return; if(n>=2){ fin=true; res(fav?2:(fet?1:0)); } } var img=new Image(); var t1=setTimeout(function(){img.onload=img.onerror=null;n++;chk();},4000); img.onload=function(){clearTimeout(t1);fav=1;n++;chk();}; img.onerror=function(){clearTimeout(t1);n++;chk();}; img.src=u+'/favicon.ico?x='+Date.now(); var ac=new AbortController(); var t2=setTimeout(function(){try{ac.abort();}catch(e){}n++;chk();},4000); fetch(u,{mode:'no-cors',cache:'no-store',signal:ac.signal}).then(function(){clearTimeout(t2);fet=1;n++;chk();}).catch(function(){clearTimeout(t2);n++;chk();}); }); }
  // 정해진 순서대로 + 배치 내 favicon 우선 → 모든 기기 동일 결과(결정적)
  function pickInOrder(list,batch){ var i=0; function nb(){ if(i>=list.length) return Promise.resolve(null); var s=list.slice(i,i+batch); i+=batch; return Promise.all(s.map(function(u){return probe(u).then(function(k){return {u:u,k:k};});})).then(function(rs){ for(var j=0;j<rs.length;j++){ if(rs[j].k===2) return rs[j].u; } for(var j2=0;j2<rs.length;j2++){ if(rs[j2].k===1) return rs[j2].u; } return nb(); }); } return nb(); }
  function genList(d,cfg){ var L=[]; var base=cfg.base, lo=cfg.from||1, to=cfg.to||40, tlds=d._tlds||['com']; var c=null; try{c=localStorage.getItem(ck);}catch(e){} var lastN=0; if(c){ var cm=c.match(/(\d+)\./); if(cm) lastN=parseInt(cm[1],10); } var hi=Math.max(to,lastN+30); tlds.forEach(function(t){ var u0='https://'+base+'.'+t; if(L.indexOf(u0)<0) L.push(u0); for(var n=hi;n>=lo;n--){ var u='https://'+base+n+'.'+t; if(L.indexOf(u)<0) L.push(u); } }); return L; }
  fetch('../urls.json?_='+Date.now(),{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
    var cfg=d[KEY]; if(!cfg){ msg('설정 없음'); return; }
    var manual=cfg.manual||[];
    if(manual.length){ done(manual[0]); return; }
    var c=null; try{c=localStorage.getItem(ck);}catch(e){}
    var fast = c ? probe(c).then(function(k){return k?c:null;}) : Promise.resolve(null);
    fast.then(function(cu){
      if(cu){ done(cu); return; }
      var L=genList(d,cfg);
      pickInOrder(L,16).then(function(u){
        if(u){ done(u); return; }
        msg('접속 가능한 주소를 못 찾았어요.<br>'+L.slice(0,10).map(function(x){return '<a href="'+x+'">'+x.replace(/^https?:\/\//,'')+'</a>';}).join(''));
      });
    });
  }).catch(function(){ msg('불러오기 실패'); });
})();
</script>
</body>
</html>
